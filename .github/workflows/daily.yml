name: Daily Philosophy Push

on:
  schedule:
    - cron: '00 1 * * *'
  workflow_dispatch:

jobs:
  push-philosophy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Send Daily Philosophy
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python daily_philosophy.py
